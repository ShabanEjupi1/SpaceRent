name: spacerent_kosovo
description: A premium Car Rental and Administrative Dashboard tailored for the Kosovo market.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  go_router: ^14.0.1
  supabase_flutter: ^2.6.0
  intl: ^0.19.0
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1
  uuid: ^4.3.3
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
