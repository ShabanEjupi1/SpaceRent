name: SpaceRent Kosovo CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 1. Build and Deploy Flutter Web to GitHub Pages
  build-and-deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Code Generation)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web Application
        run: |
          flutter build web --release --base-href "/SpaceRent/" \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Deploy Web to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  # 2. Build Android App (APK & AAB) and Deploy to Google Play Store
  build-android:
    runs-on: ubuntu-latest
    env:
      PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Code Generation)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Create Gradle Init Script to Force Kotlin Options
        run: |
          mkdir -p ~/.gradle/init.d
          cat << 'EOF' > ~/.gradle/init.d/kotlin-options.gradle
          allprojects {
              tasks.configureEach { task ->
                  if (task.class.name.contains("KotlinCompile")) {
                      println "Configuring Kotlin options for task: ${task.path} (type: ${task.class.name})"
                      try {
                          task.kotlinOptions.languageVersion = "1.8"
                          task.kotlinOptions.apiVersion = "1.8"
                          println "Successfully set languageVersion = 1.8 via kotlinOptions for task ${task.path}"
                      } catch (Exception e1) {
                          println "Failed to set via kotlinOptions: ${e1.message}"
                          try {
                              task.compilerOptions.languageVersion.set(org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_1_8)
                              task.compilerOptions.apiVersion.set(org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_1_8)
                              println "Successfully set languageVersion = 1.8 via compilerOptions for task ${task.path}"
                          } catch (Exception e2) {
                              println "Failed to set via compilerOptions: ${e2.message}"
                          }
                      }
                  }
              }
          }
          EOF

      - name: Decode Android Keystore
        env:
          PLAY_STORE_KEYSTORE_BASE64: ${{ secrets.PLAY_STORE_KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$PLAY_STORE_KEYSTORE_BASE64" ]; then
            echo "$PLAY_STORE_KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          fi

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Build Release App Bundle (AAB)
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-binaries
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

      # CD deployment to Google Play Store (triggers if JSON key exists in secrets)
      - name: Deploy to Google Play Store (Internal Track)
        uses: r0adkll/upload-google-play@v1
        if: ${{ env.PLAY_STORE_JSON_KEY != '' }}
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: com.spacerent.kosovo
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  # 3. Build iOS App (IPA) and Deploy to Apple App Store (TestFlight)
  build-ios:
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Code Generation)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build iOS Application (Unsigned IPA for testing)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      # Unsigned builds cannot go to TestFlight directly.
      # To publish to TestFlight/App Store, Fastlane and provisioning profiles are used.
      # Set up Fastlane match and code-signing when secrets are populated.
      - name: Install Apple Provisioning Profiles and Code Sign (Conditional)
        if: ${{ env.APP_STORE_CONNECT_API_KEY != '' }}
        env:
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          # Execute fastlane command to sign and upload IPA directly to TestFlight
          # bundle exec fastlane beta
          cd ..

      - name: Archive iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-archive
          path: build/ios/iphoneos/Runner.app
